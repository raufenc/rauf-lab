<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rol Model Kütüphanesi — NöroTerbiye</title>
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
  <script src="/lib/design-system/theme.js"></script>
  <style>
    .model-card { padding:28px; cursor:pointer; }
    .model-card:hover { transform:translateY(-2px); }
    .model-icon { font-size:2.5rem; margin-bottom:12px; }
    .model-name { font-size:1.1rem; font-weight:700; margin-bottom:4px; }
    .model-title { font-size:0.8rem; color:var(--text-secondary); margin-bottom:10px; }
    .model-tags { display:flex; gap:4px; flex-wrap:wrap; }
    .detail-header { display:flex; gap:20px; align-items:start; margin-bottom:24px; }
    .detail-icon { font-size:3.5rem; flex-shrink:0; }
    .detail-bio { font-size:0.9rem; line-height:1.7; color:var(--text-secondary); margin-bottom:16px; }
    .detail-lesson { padding:16px 20px; background:var(--nt-primary-soft); border-radius:var(--radius-md); border-left:3px solid var(--nt-primary); margin-bottom:16px; }
    .detail-lesson h4 { font-size:0.85rem; font-weight:700; margin-bottom:6px; }
    .detail-lesson p { font-size:0.85rem; color:var(--text-secondary); line-height:1.6; }
    .detail-quote { font-style:italic; font-size:1rem; text-align:center; padding:24px; color:var(--text-secondary); line-height:1.6; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin:20px 0; }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <section class="nt-section" style="padding-top:80px">
    <div class="nt-wrap">
      <p class="nt-label nt-fade-in" style="margin-bottom:8px">NöroTerbiye Araç</p>
      <h1 class="nt-title nt-fade-in" style="font-size:1.8rem;margin-bottom:8px;animation-delay:0.05s">🌟 Rol Model Kütüphanesi</h1>
      <p class="nt-subtitle nt-fade-in" style="animation-delay:0.1s;margin-bottom:24px">
        Nefsiyle mücadele etmiş, iradesiyle tarih yazmış isimler. İlham al, yolunu bul.
      </p>

      <div class="nt-filters nt-fade-in" style="animation-delay:0.12s" id="filters">
        <button class="nt-filter-btn active" data-f="all">Tümü</button>
        <button class="nt-filter-btn" data-f="sabir">Sabır</button>
        <button class="nt-filter-btn" data-f="irade">İrade</button>
        <button class="nt-filter-btn" data-f="ilim">İlim</button>
        <button class="nt-filter-btn" data-f="zuhd">Zühd</button>
        <button class="nt-filter-btn" data-f="cesaret">Cesaret</button>
      </div>

      <div class="nt-grid nt-grid-3 nt-stagger" id="models-grid"></div>

      <!-- Detail Modal -->
      <div class="nt-modal-overlay" id="modal">
        <div class="nt-modal" style="max-width:620px">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">
            <span></span>
            <button class="nt-btn nt-btn-ghost nt-btn-sm" onclick="closeModal()">✕</button>
          </div>
          <div id="modal-content"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="/noroterbiye/js/common.js"></script>
  <script>
    const models = [
      {
        name: 'Hz. Yusuf (a.s.)',
        icon: '🕊️',
        title: 'Şehvete karşı direnen peygamber',
        tags: ['irade','sabir'],
        bio: 'Mısır\'da köle olarak yaşarken, efendisinin karısının tüm baskılarına rağmen nefsine hakim oldu. "Rabbimin korumasına sığınırım" diyerek zindanı tercih etti. Yıllarca haksız yere hapis yattı ama ahlakından taviz vermedi.',
        lesson: 'En çaresiz anında bile "hayır" diyebilmek mümkündür. Çevre baskısı, güç dengesizliği ve yalnızlık bile iradeyi yıkamaz.',
        quote: '"Rabbim! Zindan, bana bunların beni çağırdığı şeyden daha sevimlidir." (Yusuf, 33)'
      },
      {
        name: 'Hz. Eyyub (a.s.)',
        icon: '🌿',
        title: 'Sabrın simgesi',
        tags: ['sabir'],
        bio: 'Malını, çocuklarını ve sağlığını kaybetti. Yıllarca hastalıkla mücadele etti. Ama asla şikayet etmedi, Allah\'a olan güvenini yitirmedi. Sabrı sonunda şifa ve bereketlerle ödüllendirildi.',
        lesson: 'Kayıp anında sabretmek, pasif bir bekleyiş değil aktif bir direniştir. Sabır kasılması gereken bir kastır.',
        quote: '"Gerçekten biz onu sabredici bulduk. O, ne güzel kuldu! Daima Allah\'a yönelirdi." (Sad, 44)'
      },
      {
        name: 'Ömer bin Abdülaziz',
        icon: '⚖️',
        title: 'Gücün zirvesinde zühd',
        tags: ['zuhd','irade'],
        bio: 'Emevi halifesi olarak dünyanın tüm nimetlerine sahipti. Ama halifeliğe geçince sarayı terk etti, lüks yemekleri bıraktı, halkın arasına karıştı. Kısa süren halifeliğinde adaletin simgesi oldu.',
        lesson: 'Güce sahip olduğunda bile sade kalmak en büyük irade göstergesidir. Şöhret ve konfor, en güçlü tuzaklardır.',
        quote: '"Allah beni bu ümmete hesap soracak biri olarak görevlendirdi, ben onların malından haksız yere yiyemem."'
      },
      {
        name: 'İmam Gazali',
        icon: '📚',
        title: 'Nefs muhasebesinin ustası',
        tags: ['ilim','irade'],
        bio: 'Zamanının en ünlü akademisyeniydi. Binlerce öğrencisi, makamı ve şöhreti vardı. Ama bir gün her şeyi bıraktı. "Şöhret için mi öğretiyorum?" sorusu onu derinden sarstı. Yıllarca inzivaya çekildi, kendisiyle yüzleşti.',
        lesson: 'Başarılı görünmek ile içten temiz olmak arasında uçurum olabilir. Gerçek değişim, kendine dürüst olmakla başlar.',
        quote: '"Kalbini temizlemeden ilim öğrenmek, kirli kaba temiz su doldurmak gibidir."'
      },
      {
        name: 'Hz. Hatice (r.a.)',
        icon: '🌹',
        title: 'Fedakarlık ve destek abidesi',
        tags: ['sabir','cesaret'],
        bio: 'Mekke\'nin en zengin iş kadınıydı. Tüm malını İslam davasına harcadı. En zor boykot yıllarında Peygamberimizin yanından ayrılmadı. "Sen haklısın ve Allah seni yalnız bırakmayacak" diyerek en kritik desteği verdi.',
        lesson: 'Doğru bildiğin yolda yürürken yanında duracak bir kişi bile yeter. O kişi bazen sen olabilirsin.',
        quote: '"Hayır, Allah seni asla utandırmaz. Sen akrabalarını gözetir, acizlere yardım eder, misafiri ağırlarsın."'
      },
      {
        name: 'İbn Kayyim el-Cevziyye',
        icon: '✍️',
        title: 'Nefs terbiyesinin teorisyeni',
        tags: ['ilim','irade'],
        bio: 'Hocası İbn Teymiyye ile birlikte hapsedildi. Zindanda bile eser yazmaya devam etti. Nefsin mertebeleri, hastalıkları ve tedavi yolları üzerine en detaylı eserleri kaleme aldı.',
        lesson: 'Zor şartlar üretkenliğe engel değildir. Nefsi tanımak, onu yönetmenin ilk adımıdır.',
        quote: '"Nefs, sen ona boyun eğersen seni yere serer; sen ona hakim olursan seni yükseltir."'
      },
      {
        name: 'Salahaddîn Eyyûbî',
        icon: '⚔️',
        title: 'Zafer sonrası tevazu',
        tags: ['cesaret','zuhd'],
        bio: 'Kudüs\'ü fethettikten sonra Haçlılara bile merhamet gösterdi. Dünyanın en güçlü komutanlarından biriydi ama ölürken cebinde bir cenaze kefeni alacak kadar bile para yoktu.',
        lesson: 'Güç, merhametsizlik sebebi olmamalı. Gerçek güç, galip geldiğinde bile adil ve mütevazı kalabilmektir.',
        quote: '"Öfkeyle verilen karar, adaletten uzaklaşır."'
      },
      {
        name: 'Rabia el-Adeviyye',
        icon: '💎',
        title: 'Dünyevi arzulardan arınma',
        tags: ['zuhd','sabir'],
        bio: 'Basra\'da yetim ve yoksul büyüdü. Köle olarak satıldı. Ama tüm zorluklara rağmen dünyevi hiçbir şeye bağlanmadı. Sevgisini ve ibadetini saf tutmayı hayatının merkezine koydu.',
        lesson: 'Dış koşullar ne olursa olsun, iç huzur seçimdir. Sahip olamadıklarına değil, içinde taşıdıklarına odaklan.',
        quote: '"Ya Rabbi, eğer sana cehennem korkusuyla ibadet ediyorsam beni cehennemde yak. Cennet ümidiyle ibadet ediyorsam beni cennetten mahrum et."'
      },
      {
        name: 'İmam Ahmed bin Hanbel',
        icon: '🛡️',
        title: 'Baskıya boyun eğmeyen irade',
        tags: ['cesaret','sabir','irade'],
        bio: 'Abbasi halifesi, "Kur\'an mahluktur" görüşünü kabul etmesi için yıllarca hapsetti ve işkence yaptırdı. Ama o, doğru bildiği inancından asla taviz vermedi. "Bana Kur\'an\'dan veya sünnetten bir delil gösterin, kabul edeyim" dedi.',
        lesson: 'Otorite baskısı, doğrudan sapmak için yeterli sebep değildir. İrade, en zor anlarda ortaya çıkar.',
        quote: '"İnsanlar arasında en cesur olan, nefsine hakim olandır."'
      },
      {
        name: 'Hz. Meryem (a.s.)',
        icon: '🕯️',
        title: 'İffet ve teslimiyetin zirvesi',
        tags: ['sabir','irade'],
        bio: 'Hiçbir beşeri destek olmadan, toplumun en ağır iftiralarına maruz kaldı. Ama Allah\'a olan güvenini hiç kaybetmedi. Sessiz kalıp Allah\'ın onu savunmasını bekledi.',
        lesson: 'Bazen en güçlü cevap sessizliktir. İnsanların ne düşündüğü değil, Allah\'ın ne bildiği önemlidir.',
        quote: '"Keşke bundan önce ölseydim de unutulup gitseydim." Ama kaldı ve tarih yazdı. (Meryem, 23)'
      },
      {
        name: 'İbn Sina',
        icon: '🧪',
        title: 'Disiplin ve ilim aşkı',
        tags: ['ilim','irade'],
        bio: 'Dünya tıp tarihinin en önemli isimlerinden biri. 16 yaşında tıp doktoru, 18 yaşında sarayın baş hekimi oldu. "El-Kanun fi\'t-Tıb" eseri yüzyıllarca Avrupa\'da ders kitabı olarak okutuldu. Gece gündüz çalışan bir disiplin abidesi.',
        lesson: 'Deha, disiplinle birleşmeden sonuç vermez. Büyük eserler, küçük ama sürekli adımlarla ortaya çıkar.',
        quote: '"İlim olmadan amel, temelsiz bina gibidir."'
      },
      {
        name: 'Tarık bin Ziyad',
        icon: '🔥',
        title: 'Geri dönüşü olmayan kararlılık',
        tags: ['cesaret','irade'],
        bio: 'İspanya\'ya çıktığında gemileri yaktırdı. Askerlerine "Arkanızda deniz, önünüzde düşman var. Kaçacak yeriniz yok" dedi. Bu radikal kararlılıkla sayıca üstün düşmanı yendi.',
        lesson: 'Bazen ilerlemenin tek yolu geri dönüş kapısını kapatmaktır. Yarı kararlılık, yarı sonuç doğurur.',
        quote: '"Ey insanlar! Nereye kaçacaksınız? Arkanızda deniz, önünüzde düşman. Sizin için sabır ve doğruluktan başka çare yok."'
      },
      {
        name: 'Fatıma el-Fihriyye',
        icon: '🏛️',
        title: 'İlim için servet harcayan kadın',
        tags: ['ilim','zuhd'],
        bio: 'MS 859 yılında Fas\'ta Karaviyyin Üniversitesi\'ni kurdu. Dünyanın halen faaliyette olan en eski üniversitesi. Babasından kalan mirası kendi konforu için değil, toplum için ilim yuvasına dönüştürdü.',
        lesson: 'Gerçek zenginlik, sahip olduklarını başkaları için harcayabilmektir. Bilgi paylaşıldıkça çoğalır.',
        quote: '"İlim öğrenin, çünkü ilim öğrenmek Allah\'a karşı haşyet, talep etmek ibadet, müzakere etmek tesbihtir."'
      },
    ];

    let activeFilter = 'all';

    function renderModels() {
      const grid = document.getElementById('models-grid');
      grid.innerHTML = '';
      const filtered = activeFilter === 'all' ? models : models.filter(m => m.tags.includes(activeFilter));
      filtered.forEach((m, i) => {
        grid.innerHTML += `
          <div class="nt-card nt-card-clickable model-card" onclick="showDetail(${models.indexOf(m)})">
            <div class="model-icon">${m.icon}</div>
            <div class="model-name">${m.name}</div>
            <div class="model-title">${m.title}</div>
            <div class="model-tags">
              ${m.tags.map(t => `<span class="nt-tag nt-tag-primary">${t}</span>`).join('')}
            </div>
          </div>`;
      });
    }

    document.getElementById('filters').addEventListener('click', e => {
      if (!e.target.classList.contains('nt-filter-btn')) return;
      document.querySelectorAll('.nt-filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.f;
      renderModels();
    });

    function showDetail(idx) {
      const m = models[idx];
      const content = document.getElementById('modal-content');
      content.innerHTML = `
        <div class="detail-header">
          <div class="detail-icon">${m.icon}</div>
          <div>
            <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:4px">${m.name}</h2>
            <p style="font-size:0.88rem;color:var(--text-secondary)">${m.title}</p>
            <div style="display:flex;gap:4px;margin-top:8px">
              ${m.tags.map(t => `<span class="nt-tag nt-tag-primary">${t}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="detail-bio">${m.bio}</div>
        <div class="detail-lesson">
          <h4>NöroTerbiye Dersi</h4>
          <p>${m.lesson}</p>
        </div>
        <div class="detail-quote">"${m.quote}"</div>
      `;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    renderModels();
    NT.renderNav();
    NT.renderFooter();
  </script>
</body>
</html>
